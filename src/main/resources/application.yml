spring:
  application:
    name: library-app

  datasource:
    url: jdbc:h2:mem:library
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: validate # schema comes from Flyway, never from Hibernate auto-DDL
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true

  flyway:
    enabled: true
    locations: classpath:db/migration

library:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-prod-min-32-chars}
    ttl-minutes: 15
    refresh-ttl-days: 7

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.library: DEBUG
